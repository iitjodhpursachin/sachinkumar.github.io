<!DOCTYPE html>
<html>

<head>
<title>Chhath Puja Digital Archive</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:linear-gradient(135deg,#f5f7fa,#e4ecf7);
transition:0.4s;
}

/* Dark mode */

.dark{
background:#121212;
color:white;
}

/* Header */

header{
padding:30px;
text-align:center;
background:#2c7be5;
color:white;
}

header h1{
margin:0;
font-size:36px;
}

/* Button */

.toggle{
position:absolute;
top:20px;
right:20px;
padding:8px 14px;
border:none;
background:white;
border-radius:6px;
cursor:pointer;
}

/* Grid */

.container{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

/* Cards */

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
transition:transform 0.3s, box-shadow 0.3s;
}

.dark .card{
background:#1e1e1e;
}

/* Hover animation */

.card:hover{
transform:translateY(-8px);
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.card a{
text-decoration:none;
font-size:18px;
font-weight:bold;
color:#2c7be5;
}

/* Footer */

footer{
text-align:center;
padding:20px;
background:#2c7be5;
color:white;
}

</style>

</head>

<body>

<header>

<h1>Chhath Puja Digital Archive</h1>

<p>Documenting Chhath Puja songs, rituals, interviews and cultural heritage</p>

<button class="toggle" onclick="toggleMode()">🌙 Mode</button>

</header>


<div class="container">

<div class="card">
<a href="folk songs.html">🎵 Folk Song Audio Archive</a>
</div>

<div class="card">
<a href="modern ritual_videos.html">🎥 Ritual Videos</a>
</div>

<div class="card">
<a href="interviews.html">🎤 Interviews</a>
</div>

<div class="card">
<a href="images.html">🖼️ Photo Archive</a>
</div>

<div class="card">
<a href="transcribetranslate.html">📜 Transcription & Hindi Translation</a>
</div>

<div class="card">
<a href="Researchpaper.html">📄 Research Paper</a>
</div>

<div class="card">
<a href="Map.html">🗺️ Interactive Map</a>
</div>

</div>


<footer>

<p>Digital Humanities Project | Sachin Kumar</p>

</footer>


<script>

/* Dark mode toggle */

function toggleMode(){

document.body.classList.toggle("dark");

}

</script>


</body>
</html>
